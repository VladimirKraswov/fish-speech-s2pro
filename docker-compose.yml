x-shared-env: &shared_env
  CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
  PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
  MODEL_REPO: ${MODEL_REPO:-fishaudio/s2-pro}
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: fish-speech-gateway
    restart: unless-stopped
    ports: ["${GATEWAY_PORT:-7777}:8888"]
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    environment: *shared_env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== TTS-RENDER ====================
  tts-render:
    build:
      context: .
      dockerfile: services/tts-render/Dockerfile
      target: ${BUILD_TARGET:-prod}          # prod или dev
    container_name: fish-speech-render
    restart: unless-stopped
    ports: ["${RENDER_PORT:-7778}:8888"]
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    environment:
      <<: *shared_env
      MODEL_PATH: ${MODEL_PATH:-/app/data/checkpoints/s2-pro}
      ENABLE_COMPILE: "${ENABLE_COMPILE:-false}"
      DTYPE: "${DTYPE:-bfloat16}"
      DEVICE: "${DEVICE:-cuda}"
      CHUNK_LENGTH: "${CHUNK_LENGTH:-240}"
      NORMALIZE_TEXT: "${NORMALIZE_TEXT:-true}"
      USE_MEMORY_CACHE: "${USE_MEMORY_CACHE:-on}"
      TEMPERATURE: "${TEMPERATURE:-0.62}"
      TOP_P: "${TOP_P:-0.88}"
      REPETITION_PENALTY: "${REPETITION_PENALTY:-1.15}"
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ==================== TTS-LIVE ====================
  tts-live:
    build:
      context: .
      dockerfile: services/tts-live/Dockerfile
      target: ${BUILD_TARGET:-prod}
    container_name: fish-speech-live
    restart: unless-stopped
    ports: ["${LIVE_PORT:-7779}:8888"]
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    environment:
      <<: *shared_env
      LIVE_ENGINE: "${LIVE_ENGINE:-s2cpp}"
      LIVE_MODEL_PATH: ${LIVE_MODEL_PATH:-/app/data/live_engine/s2-pro-q8_0.gguf}
      S2CPP_BIN: ${S2CPP_BIN:-/app/data/live_engine/s2}
      S2CPP_TOKENIZER_PATH: ${S2CPP_TOKENIZER_PATH:-/app/data/live_engine/tokenizer.json}
      S2CPP_EXTRA_ARGS: "${S2CPP_EXTRA_ARGS:-}"
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==================== Остальные сервисы (упрощённо) ====================
  text-preprocess:
    build:
      context: .
      dockerfile: services/text-preprocess/Dockerfile
    container_name: fish-speech-preprocess
    restart: unless-stopped
    ports: ["${PREPROCESS_PORT:-7780}:8888"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  finetune-api:
    build:
      context: .
      dockerfile: services/finetune/Dockerfile
    container_name: fish-speech-finetune-api
    restart: unless-stopped
    ports: ["${FINETUNE_PORT:-7781}:8888"]
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    environment:
      <<: *shared_env
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  finetune:
    profiles: ["manual"]
    build:
      context: .
      dockerfile: services/finetune/manual/Dockerfile
    container_name: fish-speech-finetune
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    environment:
      <<: *shared_env
    gpus: all

  frontend:
    build: ./frontend
    container_name: fish-speech-frontend
    restart: unless-stopped
    ports: ["${FRONTEND_PORT:-7070}:80"]
    depends_on:
      api-gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
