server {
    listen 80;
    server_name _;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $gateway_upstream http://fish-speech-gateway:8888;

    client_max_body_size 512m;

    location = / {
        return 302 /finetune/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /finetune {
        return 302 /finetune/;
    }

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /finetune/ {
        root /opt/finetune-ui;
        try_files /finetune.html =404;
    }

    location /finetune-assets/ {
        alias /opt/finetune-ui/;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/events {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/synthesis/stream/live {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        client_max_body_size 512m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
    }

    location /openapi.json {
        proxy_pass $gateway_upstream;
    }

    location /healthz {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
