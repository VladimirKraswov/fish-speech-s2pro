name: fish-speech-s2pro

x-shared-env: &shared_env
  CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
  PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
  MODEL_REPO: ${MODEL_REPO:-fishaudio/s2-pro}
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}

services:
  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    container_name: fish-speech-gateway
    restart: unless-stopped
    ports: ["${GATEWAY_PORT:-7777}:8888"]
    volumes:
      - ../data:/app/data
      - ../references:/app/references
    environment:
      <<: *shared_env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: fish-speech-s2pro
