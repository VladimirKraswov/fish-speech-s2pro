name: fish-speech-s2pro

x-shared-env: &shared_env
  CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
  PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
  MODEL_REPO: ${MODEL_REPO:-fishaudio/s2-pro}
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}

services:
  tts-render:
    build:
      context: ..
      dockerfile: services/tts-render/Dockerfile
      target: ${BUILD_TARGET:-prod}
      args:
        ENABLE_VLLM_OMNI: ${ENABLE_VLLM_OMNI:-true}
        VLLM_VERSION: ${VLLM_VERSION:-0.18.0}
        VLLM_OMNI_VERSION: ${VLLM_OMNI_VERSION:-}
    container_name: fish-speech-render
    restart: unless-stopped
    ports: ["${RENDER_PORT:-7778}:8888"]
    volumes:
      - ../data:/app/data
      - ../references:/app/references
    environment:
      <<: *shared_env
      RENDER_ENGINE: ${RENDER_ENGINE:-fish}
      MODEL_PATH: ${MODEL_PATH:-/app/data/checkpoints/s2-pro}
      REFERENCES_ROOT: /app/references
      ENABLE_COMPILE: "${RENDER_STACK_ENABLE_COMPILE:-true}"
      COMPILE_CUDAGRAPHS: "${COMPILE_CUDAGRAPHS:-false}"
      DTYPE: "${DTYPE:-bfloat16}"
      DEVICE: "${DEVICE:-cuda}"
      CHUNK_LENGTH: "${RENDER_STACK_CHUNK_LENGTH:-240}"
      OOM_RETRY_CHUNK_CHARS: "${OOM_RETRY_CHUNK_CHARS:-140}"
      CHUNK_JOIN_SILENCE_MS: "${CHUNK_JOIN_SILENCE_MS:-90}"
      NORMALIZE_TEXT: "${NORMALIZE_TEXT:-true}"
      USE_MEMORY_CACHE: "${USE_MEMORY_CACHE:-on}"
      TEMPERATURE: "${TEMPERATURE:-0.62}"
      TOP_P: "${TOP_P:-0.88}"
      REPETITION_PENALTY: "${REPETITION_PENALTY:-1.15}"
      VLLM_OMNI_HOST: "${VLLM_OMNI_HOST:-127.0.0.1}"
      VLLM_OMNI_PORT: "${VLLM_OMNI_PORT:-8091}"
      VLLM_OMNI_MODEL: "${VLLM_OMNI_MODEL:-fishaudio/s2-pro}"
      VLLM_OMNI_GPU_MEMORY_UTILIZATION: "${VLLM_OMNI_GPU_MEMORY_UTILIZATION:-0.9}"
      VLLM_OMNI_STAGE_CONFIGS_PATH: "${VLLM_OMNI_STAGE_CONFIGS_PATH:-}"
      VLLM_OMNI_START_TIMEOUT: "${VLLM_OMNI_START_TIMEOUT:-900}"
      VLLM_OMNI_EXTRA_ARGS: "${VLLM_OMNI_EXTRA_ARGS:-}"
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 420s

  text-preprocess:
    build:
      context: ..
      dockerfile: services/text-preprocess/Dockerfile
    container_name: fish-speech-preprocess
    restart: unless-stopped
    ports: ["${PREPROCESS_PORT:-7780}:8888"]
    volumes:
      - ../data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  finetune-api:
    build:
      context: ..
      dockerfile: services/finetune/Dockerfile
    container_name: fish-speech-finetune-api
    restart: unless-stopped
    ports: ["${FINETUNE_PORT:-7781}:8888"]
    volumes:
      - ../data:/app/data
      - ../references:/app/references
    environment:
      <<: *shared_env
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    container_name: fish-speech-gateway
    restart: unless-stopped
    ports: ["${GATEWAY_PORT:-7777}:8888"]
    volumes:
      - ../data:/app/data
      - ../references:/app/references
    environment:
      <<: *shared_env
      LIVE_ENGINE: "disabled"
      RENDER_ENGINE: ${RENDER_ENGINE:-fish}
      REFERENCE_MAX_SECONDS: "${REFERENCE_MAX_SECONDS:-30}"
      REFERENCE_SAMPLE_RATE: "${REFERENCE_SAMPLE_RATE:-24000}"
      REFERENCE_CHANNELS: "${REFERENCE_CHANNELS:-1}"
      RENDER_MAX_CONCURRENCY: "${RENDER_MAX_CONCURRENCY:-1}"
      RENDER_MAX_QUEUE: "${RENDER_MAX_QUEUE:-8}"
    depends_on:
      tts-render: { condition: service_healthy }
      text-preprocess: { condition: service_healthy }
      finetune-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ../frontend
    container_name: fish-speech-frontend
    restart: unless-stopped
    ports: ["${FRONTEND_PORT:-7070}:80"]
    depends_on:
      api-gateway: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: fish-speech-s2pro
