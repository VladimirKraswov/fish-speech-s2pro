name: fish-speech-s2pro

x-shared-env: &shared_env
  CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
  PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
  MODEL_REPO: ${MODEL_REPO:-fishaudio/s2-pro}
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}

services:
  tts-render:
    build:
      context: ..
      dockerfile: services/tts-render/Dockerfile
      target: ${BUILD_TARGET:-prod}
      args:
        ENABLE_VLLM_OMNI: ${ENABLE_VLLM_OMNI:-true}
        VLLM_VERSION: ${VLLM_VERSION:-0.18.0}
        VLLM_OMNI_VERSION: ${VLLM_OMNI_VERSION:-}
    container_name: fish-speech-render
    restart: unless-stopped
    ports: ["${RENDER_PORT:-7778}:8888"]
    volumes:
      - ../data:/app/data
      - ../references:/app/references
    environment:
      <<: *shared_env
      RENDER_ENGINE: ${RENDER_ENGINE:-fish}
      MODEL_PATH: ${MODEL_PATH:-/app/data/checkpoints/s2-pro}
      REFERENCES_ROOT: /app/references
      ENABLE_COMPILE: "${ENABLE_COMPILE:-false}"
      DTYPE: "${DTYPE:-bfloat16}"
      DEVICE: "${DEVICE:-cuda}"
      CHUNK_LENGTH: "${CHUNK_LENGTH:-240}"
      NORMALIZE_TEXT: "${NORMALIZE_TEXT:-true}"
      USE_MEMORY_CACHE: "${USE_MEMORY_CACHE:-on}"
      TEMPERATURE: "${TEMPERATURE:-0.62}"
      TOP_P: "${TOP_P:-0.88}"
      REPETITION_PENALTY: "${REPETITION_PENALTY:-1.15}"
      VLLM_OMNI_HOST: "${VLLM_OMNI_HOST:-127.0.0.1}"
      VLLM_OMNI_PORT: "${VLLM_OMNI_PORT:-8091}"
      VLLM_OMNI_MODEL: "${VLLM_OMNI_MODEL:-fishaudio/s2-pro}"
      VLLM_OMNI_GPU_MEMORY_UTILIZATION: "${VLLM_OMNI_GPU_MEMORY_UTILIZATION:-0.9}"
      VLLM_OMNI_STAGE_CONFIGS_PATH: "${VLLM_OMNI_STAGE_CONFIGS_PATH:-}"
      VLLM_OMNI_START_TIMEOUT: "${VLLM_OMNI_START_TIMEOUT:-2400}"
      VLLM_OMNI_EXTRA_ARGS: "${VLLM_OMNI_EXTRA_ARGS:-}"
    gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: ${RENDER_HEALTHCHECK_START_PERIOD:-2400s}

networks:
  default:
    name: fish-speech-s2pro
