name: gptsovits-v2-demo

x-gptsovits-env: &gptsovits_env
  HF_HOME: /app/data/hf-cache
  HUGGINGFACE_HUB_CACHE: /app/data/hf-cache
  TRANSFORMERS_CACHE: /app/data/hf-cache
  TORCH_HOME: /app/data/torch-cache
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
  GPTSOVITS_MODEL_REPO: ${GPTSOVITS_MODEL_REPO:-lj1995/GPT-SoVITS}
  GPTSOVITS_UPSTREAM_REPO: ${GPTSOVITS_UPSTREAM_REPO:-https://github.com/TZFC/GPT-SoVITS-V2.git}
  GPTSOVITS_UPSTREAM_REF: ${GPTSOVITS_UPSTREAM_REF:-main}
  GPTSOVITS_VERSION: ${GPTSOVITS_VERSION:-v2}
  GPTSOVITS_DEVICE: ${GPTSOVITS_DEVICE:-cuda}
  GPTSOVITS_HALF: "${GPTSOVITS_HALF:-true}"
  GPTSOVITS_DOWNLOAD_CONCURRENCY: "${GPTSOVITS_DOWNLOAD_CONCURRENCY:-8}"

services:
  gptsovits-runtime:
    build:
      context: .
      dockerfile: services/gptsovits-runtime/Dockerfile
      args:
        GPT_SOVITS_UPSTREAM_REPO: ${GPTSOVITS_UPSTREAM_REPO:-https://github.com/TZFC/GPT-SoVITS-V2.git}
        GPT_SOVITS_UPSTREAM_REF: ${GPTSOVITS_UPSTREAM_REF:-main}
    container_name: gptsovits-v2-runtime
    restart: unless-stopped
    environment:
      <<: *gptsovits_env
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      GPTSOVITS_API_PORT: "${GPTSOVITS_API_PORT:-9880}"
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    gpus: all
    shm_size: ${GPTSOVITS_SHM_SIZE:-16g}
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${GPTSOVITS_API_PORT:-9880}/tts || true); test \"$$code\" = \"400\" -o \"$$code\" = \"422\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: ${GPTSOVITS_RUNTIME_HEALTH_START_PERIOD:-1200s}

  gptsovits-gateway:
    build:
      context: .
      dockerfile: services/gptsovits-gateway/Dockerfile
    container_name: gptsovits-v2-gateway
    restart: unless-stopped
    environment:
      GPTSOVITS_RUNTIME_URL: http://gptsovits-runtime:${GPTSOVITS_API_PORT:-9880}
      GPTSOVITS_DATA_ROOT: /app/data
      GPTSOVITS_REFERENCES_ROOT: /app/references
      GPTSOVITS_REFERENCE_MAX_SECONDS: "${GPTSOVITS_REFERENCE_MAX_SECONDS:-12}"
      GPTSOVITS_REFERENCE_SAMPLE_RATE: "${GPTSOVITS_REFERENCE_SAMPLE_RATE:-24000}"
      GPTSOVITS_REFERENCE_CHANNELS: "${GPTSOVITS_REFERENCE_CHANNELS:-1}"
      GPTSOVITS_SYNTHESIS_TIMEOUT_SEC: "${GPTSOVITS_SYNTHESIS_TIMEOUT_SEC:-900}"
    ports:
      - "${GPTSOVITS_GATEWAY_PORT:-7088}:8888"
    volumes:
      - ./data:/app/data
      - ./references:/app/references
    depends_on:
      gptsovits-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  gptsovits-frontend:
    build:
      context: ./services/gptsovits-frontend
    container_name: gptsovits-v2-frontend
    restart: unless-stopped
    ports:
      - "${GPTSOVITS_FRONTEND_PORT:-7070}:80"
    depends_on:
      gptsovits-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  default:
    name: gptsovits-v2-demo
